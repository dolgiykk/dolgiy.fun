services:

  php:
    build:
      context: ./backend
      dockerfile: ../deploy/docker/php/Dockerfile

    working_dir: /var/www/html

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_started

    networks:
      - app

    environment:
      PHP_IDE_CONFIG: "serverName=php-service"
      APP_NAME: ${APP_NAME}

  frontend:
    build:
      context: ./frontend
      dockerfile: ../deploy/docker/frontend/Dockerfile

    working_dir: /app

    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

    ports:
      - "5173:5173"

    stdin_open: true
    tty: true

    networks:
      - app

  nginx:
    image: nginx:1.29-alpine

    depends_on:
      - php

    ports:
      - "8080:80"

    volumes:
      - ./deploy/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    networks:
      - app

  postgres:
    image: postgres:17-alpine

    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dolfun"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - app

  redis:
    image: redis:8-alpine

    command: redis-server --appendonly yes

    networks:
      - app

volumes:
  postgres_data:
  frontend_node_modules:
networks:
  app: